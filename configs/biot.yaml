# BIOT model configuration
# BIOTClassifier params: emb_size, heads, depth, n_classes, n_channels, n_fft, hop_length
# n_channels: Number of channels at model creation (determined by pre-training weights; used for channel_tokens embedding)
# data_channels: Number of channels in the actual input data (only these channels are used during forward pass)
CONFIGS:
  tuab:
    n_channels: 18
    data_channels: 16
    num_classes: 1
    emb_size: 256
    heads: 8
    depth: 4
    n_fft: 200
    hop_length: 100
    fs: 200

  tuev:
    task_type: event
    n_channels: 18
    data_channels: 16
    num_classes: 6
    emb_size: 256
    heads: 8
    depth: 4
    n_fft: 200
    hop_length: 100
    fs: 200

  chb:
    n_channels: 18
    data_channels: 16
    num_classes: 1
    emb_size: 256
    heads: 8
    depth: 4
    n_fft: 200
    hop_length: 100
    fs: 200
