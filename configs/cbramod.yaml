# CBraMod model configuration
# All configurations extracted from model_list/cbramod.py
CONFIGS:
  tuab:
    n_channels: 16
    n_patches: 10
    num_classes: 1
    patch_size: 200
    d_model: 200
    classifier_type: all_patch_reps
    dropout: 0.1
    freeze_backbone: false
    fs: 200
    task_type: state
    domain: clinical
    epoch_duration: 10.0
    epoch_structure: "10s连续EEG滑动窗口"
    dataset_description: "临床EEG记录，每个样本为连续EEG的10秒滑动窗口切片，标签为二分类：正常/异常EEG"
    class_names:
      0: "正常EEG"
      1: "异常EEG"

  bciciv2a:
    n_channels: 22
    n_patches: 4
